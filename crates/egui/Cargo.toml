[package]
name = "egui"
version.workspace = true
authors = ["Emil Ernerfeldt <emil.ernerfeldt@gmail.com>"]
description = "An easy-to-use immediate mode GUI that runs on both web and native"
edition.workspace = true
rust-version.workspace = true
homepage = "https://github.com/emilk/egui"
license.workspace = true
readme = "../../README.md"
repository = "https://github.com/emilk/egui"
categories = ["gui", "game-development"]
keywords = ["gui", "imgui", "immediate", "portable", "gamedev"]
include = ["../../LICENSE-APACHE", "../../LICENSE-MIT", "**/*.rs", "Cargo.toml"]

[lints]
workspace = true

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--generate-link-to-definition"]

[lib]


[features]
default = ["default_fonts"]

## [`bytemuck`](https://docs.rs/bytemuck) enables you to cast [`epaint::Vertex`], [`emath::Vec2`] etc to `&[u8]`.
bytemuck = ["epaint/bytemuck"]

## Show a debug-ui on hover including the stacktrace to the hovered item.
## This is very useful in finding the code that creates a part of the UI.
## Does not work on web.
callstack = ["dep:backtrace"]

## [`cint`](https://docs.rs/cint) enables interoperability with other color libraries.
cint = ["epaint/cint"]

## Enable the [`hex_color`] macro.
color-hex = ["epaint/color-hex"]

## If set, egui will use `include_bytes!` to bundle some fonts.
## If you plan on specifying your own fonts you may disable this feature.
default_fonts = ["epaint/default_fonts"]

## The legacy IME composition visuals have several shortcomings. Most notably,
## they are visually identical to text selection, making it impossible to tell
## the two apart if there is no candidate window (e.g. when using a Korean IME).
## In addition, the cursor is always shown at the end of the composition no
## matter where the actual cursor is, which makes composing Chinese and Japanese
## text confusing.
##
## However, the new composition visuals are not yet fully reliable either. For
## example, on Windows, `winit` currently reports an incorrect cursor position
## for Korean IMEs: the cursor should be at the end of the composition, but
## `winit` reports it at the beginning. Therefore, we keep the legacy visuals
## as an option for now and plan to remove them once the new visuals work
## correctly across all supported platforms.
legacy_ime_composition_visuals = []

## [`mint`](https://docs.rs/mint) enables interoperability with other math libraries such as [`glam`](https://docs.rs/glam) and [`nalgebra`](https://docs.rs/nalgebra).
mint = ["epaint/mint"]

## Enable persistence of memory (window positions etc).
persistence = ["serde", "epaint/serde", "ron"]


## Enable parallel tessellation using [`rayon`](https://docs.rs/rayon).
##
## This can help performance for graphics-intense applications.
rayon = ["epaint/rayon"]

## Allow serialization using [`serde`](https://docs.rs/serde).
serde = ["dep:serde", "epaint/serde", "accesskit/serde"]

## Change Vertex layout to be compatible with unity
unity = ["epaint/unity"]

## Override and disable the legacy_ime_composition_visuals feature.
_override_legacy_ime_composition_visuals = []

## Override and disable the unity feature
## This exists, so that when testing with --all-features, snapshots render correctly.
_override_unity = ["epaint/_override_unity"]


[dependencies]
emath = { workspace = true, default-features = false }
epaint = { workspace = true, default-features = false }

accesskit.workspace = true
ahash.workspace = true
bitflags.workspace = true
itertools.workspace = true
log.workspace = true
nohash-hasher.workspace = true
profiling.workspace = true
smallvec.workspace = true
unicode-segmentation.workspace = true

#! ### Optional dependencies

backtrace = { workspace = true, optional = true }

## Enable this when generating docs.
document-features = { workspace = true, optional = true }

ron = { workspace = true, optional = true }
serde = { workspace = true, optional = true, features = ["derive", "rc"] }
